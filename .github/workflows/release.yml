name: release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: manual-release
  cancel-in-progress: false

jobs:
  version:
    name: compute version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.next.outputs.version }}
      tag: ${{ steps.next.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next odometer SemVer
        id: next
        shell: bash
        run: |
          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)"
          if [ -n "$latest_tag" ]; then
            base="${latest_tag#v}"
          else
            base="0.0.0"
          fi

          IFS=. read -r major minor patch <<< "$base"
          patch=$((patch + 1))
          if [ "$patch" -gt 9 ]; then
            patch=0
            minor=$((minor + 1))
          fi

          if [ "$minor" -gt 9 ]; then
            minor=0
            major=$((major + 1))
          fi

          next="$major.$minor.$patch"

          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "tag=v$next" >> "$GITHUB_OUTPUT"
          echo "Next release: v$next"

  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  build:
    name: build ${{ matrix.name }}
    needs: [version, check]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            goos: linux
            goarch: amd64
            suffix: linux-x86_64
          - name: linux-aarch64
            goos: linux
            goarch: arm64
            suffix: linux-aarch64
          - name: macos-aarch64
            goos: darwin
            goarch: arm64
            suffix: macos-aarch64
          - name: windows-x86_64
            goos: windows
            goarch: amd64
            suffix: windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.version.outputs.version }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          mkdir -p dist
          go build -o "dist/feedlet-v${VERSION}-${SUFFIX}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: feedlet-v${{ needs.version.outputs.version }}-${{ matrix.suffix }}
          path: dist/feedlet-v${{ needs.version.outputs.version }}-${{ matrix.suffix }}
          if-no-files-found: error

  release:
    name: publish release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.version.outputs.tag }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          gh release create "$TAG" dist/* \
            --title "feedlet v$VERSION" \
            --notes "Automated release from $GITHUB_SHA" \
            --target "$GITHUB_SHA"
